<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dragon Ball TikTok Battle</title>
<style>
  :root{
    --left:#ff7a00; --right:#2d6cff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; overflow:hidden; font-family:"Trebuchet MS","Segoe UI",sans-serif; color:#fff;
    background:#05060d;}
  #app{position:relative; width:100vw; height:100vh;}

  /* ---------- fondo ---------- */
  .bg{position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(120% 80% at 20% 10%, rgba(255,122,0,.18), transparent 50%),
      radial-gradient(120% 80% at 80% 10%, rgba(45,108,255,.18), transparent 50%),
      radial-gradient(140% 120% at 50% 120%, rgba(120,60,255,.20), transparent 60%),
      linear-gradient(#070912,#02030a 70%);}
  .stars{position:absolute; inset:0; z-index:0; opacity:.5;
    background-image:radial-gradient(1px 1px at 10% 20%,#fff,transparent),
      radial-gradient(1px 1px at 30% 70%,#fff,transparent),
      radial-gradient(1px 1px at 60% 40%,#fff,transparent),
      radial-gradient(1px 1px at 80% 80%,#fff,transparent),
      radial-gradient(1px 1px at 90% 30%,#fff,transparent),
      radial-gradient(1px 1px at 45% 15%,#fff,transparent);
    background-size:200px 200px; animation:twinkle 5s linear infinite;}
  @keyframes twinkle{50%{opacity:.2}}
  body.shake #app{animation:shake .5s linear;}
  @keyframes shake{0%,100%{transform:translate(0,0)}
    20%{transform:translate(-10px,6px)}40%{transform:translate(8px,-8px)}
    60%{transform:translate(-7px,-4px)}80%{transform:translate(6px,7px)}}

  /* ---------- choque de haces (WebGL) ---------- */
  #clash{position:absolute; inset:0; width:100%; height:100%; z-index:1; pointer-events:none;}
  #mon-right{transform:scaleX(-1);}   /* el luchador derecho mira a la izquierda */

  /* ---------- escenario ---------- */
  .stage{position:relative; z-index:2; display:grid;
    grid-template-columns:1fr auto 1fr; align-items:end; height:100%;
    padding:0 3vw 4vh;}

  /* ---------- temporizador / centro ---------- */
  .center{display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    align-self:start; padding-top:2vh; gap:10px; min-width:240px;}
  .timer{font-family:"Consolas",monospace; font-size:84px; font-weight:bold; letter-spacing:2px;
    text-shadow:0 0 18px rgba(255,210,60,.7), 0 0 4px #000; line-height:1;}
  .timer.low{color:#ff4242; text-shadow:0 0 22px rgba(255,40,40,.9), 0 0 4px #000;
    animation:pulse .7s ease-in-out infinite;}
  @keyframes pulse{50%{transform:scale(1.08)}}
  .timer-row{display:flex; align-items:center; justify-content:center; gap:16px;}
  .timer-avatar{width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    border:3px solid rgba(255,255,255,.9); background:rgba(0,0,0,.45); color:#fff;
    font-size:24px; font-weight:bold; text-shadow:1px 1px 0 #000; overflow:hidden;
    box-shadow:0 0 18px rgba(255,210,60,.35);}
  .timer-avatar img{width:100%; height:100%; object-fit:cover; display:block;}
  .timer-avatar.empty{opacity:.35;}
  .duel-users{position:absolute; z-index:8; pointer-events:none; left:15vw; right:15vw; top:14vh;
    display:grid; grid-template-columns:minmax(0,1fr) auto minmax(0,1fr); align-items:center; gap:24px;}
  .duel-user{min-width:0; font-size:clamp(28px,4.1vw,58px); font-weight:900; line-height:1;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; letter-spacing:0;
    text-shadow:3px 3px 0 #000, 0 0 18px currentColor, 0 0 34px rgba(255,255,255,.22);}
  #duel-user-left{text-align:right; color:var(--left);}
  #duel-user-right{text-align:left; color:var(--right);}
  .vs{font-size:clamp(34px,4.6vw,64px); font-weight:bold; font-style:italic;
    color:#ffd23f; text-shadow:0 0 14px rgba(255,210,60,.8), 2px 2px 0 #000;}
  .feed{display:flex; flex-direction:column; gap:6px; align-items:center; height:30vh; overflow:hidden;
    width:260px;}
  /* avisos de regalo / subida de fase: DELANTE del personaje, en la zona media,
     y un poco a la izq/dcha del centro según el lado que dona */
  .feed-side{position:absolute; z-index:8; pointer-events:none;
    display:flex; flex-direction:column; gap:6px; align-items:center; transform:translateX(-50%);}
  #feed-left{left:47%; top:34%;}    /* casi centrado, lado izq un pelín arriba */
  #feed-right{left:53%; top:49%;}   /* casi centrado, lado dcho un pelín abajo */
  .gift-pop{font-size:15px; font-weight:bold; padding:5px 12px; border-radius:20px;
    background:rgba(0,0,0,.45); border:1px solid rgba(255,255,255,.18);
    animation:floatUp 3.4s ease-out forwards; white-space:nowrap;}
  @keyframes floatUp{0%{opacity:0; transform:translateY(14px) scale(.8)}
    12%{opacity:1; transform:translateY(0) scale(1)}100%{opacity:0; transform:translateY(-40px)}}

  /* ---------- scouter: medidor de KI estilo Dragon Ball ---------- */
  .scouter{position:absolute; top:24vh; z-index:7; pointer-events:none; display:none;
    width:min(27vw,250px); --sc:#ff7a00;
    font-family:"Consolas","Courier New",monospace;
    filter:drop-shadow(0 4px 7px rgba(0,0,0,.55));}
  .scouter.on{display:block;}
  #scouter-left{right:53%;}
  #scouter-right{left:53%;}
  .scouter .lens{position:relative; overflow:hidden; padding:7px 16px 9px;
    background:linear-gradient(135deg, rgba(10,16,26,.93), rgba(4,8,16,.8));
    border:1.5px solid var(--sc);
    box-shadow:0 0 16px var(--sc), inset 0 0 22px rgba(0,0,0,.65);
    clip-path:polygon(0 0,100% 0,100% 62%,85% 100%,0 100%);}
  #scouter-right .lens{clip-path:polygon(0 0,100% 0,100% 100%,15% 100%,0 62%);}
  .scouter .lens::after{content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(120deg, transparent 42%, rgba(255,255,255,.08) 50%, transparent 58%);}
  .sc-top{display:flex; align-items:center; gap:8px; margin-bottom:1px;}
  #scouter-right .sc-top{flex-direction:row-reverse;}
  .sc-tag{font-size:10px; letter-spacing:2px; font-weight:bold; color:var(--sc);
    opacity:.9; text-transform:uppercase; text-shadow:0 0 6px var(--sc); white-space:nowrap;}
  .sc-dot{width:7px; height:7px; border-radius:50%; background:#ff3b3b;
    box-shadow:0 0 7px #ff3b3b; animation:scDot 1.1s steps(2) infinite; flex:none;}
  @keyframes scDot{50%{opacity:.2}}
  .sc-readout{display:flex; align-items:baseline; gap:5px; line-height:1;}
  #scouter-right .sc-readout{flex-direction:row-reverse;}
  .sc-ki{font-size:32px; font-weight:bold; color:#fff; letter-spacing:1px; white-space:nowrap;
    text-shadow:0 0 10px var(--sc), 0 0 3px var(--sc), 1px 1px 0 #000;
    animation:scFlick 2.4s ease-in-out infinite;}
  @keyframes scFlick{49%{opacity:1}49.5%{opacity:.78}50%{opacity:1}
    92%{opacity:1}92.5%{opacity:.85}93%{opacity:1}}
  .scouter.ki-warn .sc-ki{animation:kiBlinkSlow 1.25s steps(2) infinite;}
  .scouter.ki-danger .sc-ki{animation:kiBlinkFast .42s steps(2) infinite; color:#ffe24d;
    text-shadow:0 0 14px #ff3b3b, 0 0 6px var(--sc), 1px 1px 0 #000;}
  @keyframes kiBlinkSlow{50%{opacity:.35}}
  @keyframes kiBlinkFast{50%{opacity:.18}}
  .sc-unit{font-size:12px; font-weight:bold; color:var(--sc); opacity:.85;}
  .sc-user{display:none; max-width:180px; margin-top:3px; font-size:12px; font-weight:bold; color:#fff;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; opacity:.9;
    text-shadow:0 0 7px var(--sc), 1px 1px 0 #000;}
  #scouter-right .sc-user{text-align:right; margin-left:auto;}
  .sc-bars{display:flex; gap:3px; margin-top:5px;}
  #scouter-right .sc-bars{flex-direction:row-reverse;}
  .sc-bars i{position:relative; flex:1; height:4px; overflow:hidden;
    background:rgba(255,255,255,.12); border-radius:1px;}
  .sc-bars i span{position:absolute; inset:0; width:100%; background:var(--sc);
    box-shadow:0 0 6px var(--sc); transform-origin:left; transform:scaleX(var(--fill,0));
    transition:transform .35s cubic-bezier(.2,.8,.2,1);}
  #scouter-right .sc-bars i span{transform-origin:right;}
  .sc-scan{position:absolute; left:0; right:0; top:0; height:2px; pointer-events:none;
    background:linear-gradient(90deg, transparent, var(--sc), transparent);
    opacity:.5; mix-blend-mode:screen; animation:scScan 2.6s linear infinite;}
  @keyframes scScan{0%{top:-6%}100%{top:106%}}
  .scouter.spike .lens{animation:scSpike .6s ease-out;}
  @keyframes scSpike{0%{box-shadow:0 0 16px var(--sc), inset 0 0 22px rgba(0,0,0,.65)}
    22%{box-shadow:0 0 30px #ff3b3b, 0 0 60px #ff3b3b, inset 0 0 22px rgba(0,0,0,.4); transform:scale(1.06)}
    100%{box-shadow:0 0 16px var(--sc), inset 0 0 22px rgba(0,0,0,.65); transform:scale(1)}}
  .scouter.spike .sc-ki{animation:scKiSpike .6s ease-out;}
  @keyframes scKiSpike{0%,100%{color:#fff}30%{color:#ffe24d; text-shadow:0 0 20px #ff3b3b, 0 0 8px #ff3b3b}}

  /* ---------- luchador ---------- */
  .fighter{position:relative; display:flex; flex-direction:column; align-items:center; gap:10px;
    height:100%; justify-content:flex-end;}
  .fighter.left{align-items:flex-end;}     /* pegado hacia el centro (stream vertical) */
  .fighter.right{align-items:flex-start;}

  /* barras: ancladas abajo, se tocan en el centro y caben dentro del sprite */
  .nameplate{display:flex; flex-direction:column; gap:5px; padding:0 6px; width:min(33vw,360px);}
  .stage > .nameplate{position:absolute; bottom:4vh; z-index:3;}
  #np-left{right:51%; padding-right:12px;}
  #np-right{left:51%; padding-left:12px; align-items:flex-end; text-align:right;}
  .who{display:flex; align-items:center; gap:9px;}
  #np-right .who{flex-direction:row-reverse;}
  .avatar{width:38px; height:38px; border-radius:50%; object-fit:cover; border:2px solid #fff;
    background:#222; flex:none;}
  .cname{font-size:27px; font-weight:bold; text-shadow:2px 2px 0 #000, 0 0 12px currentColor;}
  .phase{font-size:17px; font-weight:bold; letter-spacing:.5px;
    text-shadow:1px 1px 0 #000, 0 0 10px currentColor; min-height:20px;}

  .ebar{position:relative; height:22px; border-radius:12px; overflow:hidden;
    background:rgba(255,255,255,.10); border:2px solid rgba(0,0,0,.5); width:100%;}
  .efill{position:absolute; inset:0; transform-origin:left; width:100%;
    transition:transform .5s cubic-bezier(.2,.8,.2,1);}
  #np-right .efill{transform-origin:right;}   /* la barra derecha se carga de derecha a izquierda */
  /* power up de la barra al cambiar de fase: pop + brillo + barrido de luz */
  .ebar.powerup{animation:ebarPop .7s ease-out;}
  @keyframes ebarPop{0%{transform:scale(1); box-shadow:0 0 0 0 transparent;}
    20%{transform:scale(1.09); box-shadow:0 0 16px 3px var(--pu,#ffd23f), 0 0 30px var(--pu,#ffd23f);}
    100%{transform:scale(1); box-shadow:0 0 0 0 transparent;}}
  .ebar::after{content:""; position:absolute; top:0; bottom:0; left:0; width:45%; pointer-events:none;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,.95), transparent);
    transform:translateX(-160%); opacity:0; mix-blend-mode:screen; z-index:2;}
  .ebar.powerup::after{animation:ebarShine .7s ease-out;}
  @keyframes ebarShine{0%{transform:translateX(-160%); opacity:0;}
    15%{opacity:1;} 100%{transform:translateX(330%); opacity:0;}}
  .estat{display:flex; justify-content:space-between; font-size:14px; font-weight:bold;
    text-shadow:1px 1px 0 #000; opacity:.95;}
  #np-right .estat{flex-direction:row-reverse;}

  .supporters{font-size:13px; opacity:.85; height:18px; overflow:hidden; text-shadow:1px 1px 0 #000;}
  .queue{position:absolute; left:50%; bottom:6px; z-index:9; transform:translateX(-50%);
    width:min(92vw,720px); min-height:18px; text-align:center; font-size:12px; font-weight:bold;
    color:rgba(255,255,255,.82); text-shadow:1px 1px 0 #000; pointer-events:none;}
  .queue b{color:#ffd23f;}
  .queue span{display:inline-block; max-width:150px; overflow:hidden; text-overflow:ellipsis;
    white-space:nowrap; vertical-align:bottom;}

  /* ---------- sprite + aura ---------- */
  /* margin-bottom = hueco que antes dejaba la nameplate (ahora absoluta) para conservar la altura del sprite */
  .charbox{position:relative; width:min(34vw,420px); height:46vh; display:flex;
    align-items:flex-end; justify-content:center; margin-bottom:20.3vh;}
  /* acercar un poco los dos rivales hacia el centro (stream vertical) */
  #box-left{transform:translateX(3.5vw);}
  #box-right{transform:translateX(-3.5vw);}
  .aura{position:absolute; left:50%; top:55%; width:120%; height:120%;
    transform:translate(-50%,-50%); border-radius:50%; pointer-events:none;
    background:radial-gradient(closest-side, var(--glow) 0%, transparent 72%);
    opacity:0; filter:blur(6px); transition:opacity .4s, background .4s;
    animation:auraPulse 1.4s ease-in-out infinite;}
  @keyframes auraPulse{50%{transform:translate(-50%,-50%) scale(1.06)}}
  /* monigote (cuerpo SVG + cara = foto de perfil) */
  .monigote{position:relative; z-index:2; width:min(30vw,360px); height:46vh;
    display:flex; align-items:flex-end; justify-content:center;}
  .mon-svg{height:100%; width:auto; overflow:visible; transition:filter .4s;
    animation:bob 2.6s ease-in-out infinite; transform-origin:50% 100%;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .charbox.charging .mon-svg{animation:bobFast .45s ease-in-out infinite;}
  @keyframes bobFast{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.03)}}
  .sprite-layer{transform-box:fill-box; transform-origin:50% 100%;}
  .sprite-layer.sprite-bob{animation:bob 2.6s ease-in-out infinite;}
  .charbox.charging .sprite-layer.sprite-bob{animation:bobFast .45s ease-in-out infinite;}
  .mon-svg image{filter:saturate(1.05);}
  .mon-svg .arms-charge, .mon-svg .kiball{display:none;}
  .charbox.charging .mon-svg .arms-idle{display:none;}
  .charbox.charging .mon-svg .arms-charge{display:block;}
  .charbox.charging .mon-svg .kiball{display:block;}
  .mon-svg .kiball circle{transform-box:fill-box; transform-origin:center;
    animation:kipulse .5s ease-in-out infinite;}
  @keyframes kipulse{0%,100%{transform:scale(.85); opacity:.85}50%{transform:scale(1.3); opacity:1}}

  /* partículas de energía subiendo */
  .particles{position:absolute; left:50%; bottom:0; width:60%; height:80%;
    transform:translateX(-50%); pointer-events:none; z-index:1; opacity:0; transition:opacity .4s;}
  .particles span{position:absolute; bottom:0; width:6px; height:6px; border-radius:50%;
    background:var(--glow); box-shadow:0 0 8px var(--glow); animation:rise 1.6s linear infinite;}
  @keyframes rise{0%{transform:translateY(0) scale(1); opacity:0}
    20%{opacity:1}100%{transform:translateY(-46vh) scale(.2); opacity:0}}

  /* lightning para fases altas */
  .charbox.lightning::before, .charbox.lightning::after{content:""; position:absolute;
    inset:-6% -10%; z-index:3; pointer-events:none; border-radius:50%;
    background:repeating-conic-gradient(from 0deg, transparent 0deg 18deg, rgba(255,255,255,.12) 19deg 20deg);
    mix-blend-mode:screen; animation:spark .18s steps(2) infinite; opacity:.0;}
  .charbox.charged.lightning::before{opacity:.14;}
  @keyframes spark{50%{transform:rotate(8deg)}}

  /* transformación: destello radial + onda expansiva (sin recuadro) */
  .flash{position:absolute; left:50%; top:50%; width:0; height:0; z-index:30; pointer-events:none;}
  .flash::before, .flash::after{content:""; position:absolute; left:0; top:0;
    transform:translate(-50%,-50%) scale(.2); border-radius:50%; opacity:0;}
  .flash::before{width:64vh; height:64vh;
    background:radial-gradient(circle, rgba(255,255,255,.98) 0%, rgba(255,255,255,.5) 22%, rgba(255,255,255,0) 52%);}
  .flash::after{width:26vh; height:26vh; border:0.7vh solid var(--glow); box-shadow:0 0 4vh var(--glow);}
  .flash.go::before{animation:flashBurst .6s ease-out;}
  .flash.go::after{animation:flashRing .7s ease-out;}
  @keyframes flashBurst{0%{opacity:0; transform:translate(-50%,-50%) scale(.2)}
    16%{opacity:1; transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0; transform:translate(-50%,-50%) scale(1.5)}}
  @keyframes flashRing{0%{opacity:0; transform:translate(-50%,-50%) scale(.1)}
    12%{opacity:.95} 100%{opacity:0; transform:translate(-50%,-50%) scale(3)}}
  /* pilar de energía vertical (rayo de poder hacia arriba) */
  .flash .fx-pillar{position:absolute; left:0; top:0; transform:translate(-50%,-50%) scaleY(.1);
    width:13vh; height:120vh; opacity:0; border-radius:50%; pointer-events:none; mix-blend-mode:screen;
    background:linear-gradient(to top, transparent, var(--glow) 22%, #fff 50%, var(--glow) 78%, transparent);
    filter:blur(3px);}
  .flash.go .fx-pillar{animation:fxPillar .65s ease-out;}
  @keyframes fxPillar{0%{opacity:0; transform:translate(-50%,-50%) scaleY(.1)}
    26%{opacity:.95; transform:translate(-50%,-50%) scaleY(1)}
    100%{opacity:0; transform:translate(-50%,-50%) scaleY(1.12)}}
  /* segunda onda blanca, con leve retardo */
  .flash .fx-ring2{position:absolute; left:0; top:0; transform:translate(-50%,-50%) scale(.1);
    width:30vh; height:30vh; border-radius:50%; border:0.5vh solid #fff; opacity:0; pointer-events:none;}
  .flash.go .fx-ring2{animation:fxRing2 .8s ease-out .08s;}
  @keyframes fxRing2{0%{opacity:0; transform:translate(-50%,-50%) scale(.1)}
    14%{opacity:.8} 100%{opacity:0; transform:translate(-50%,-50%) scale(3.4)}}
  .charbox.transform .mon-svg,
  .charbox.transform .sprite-layer{animation:power 0.7s ease-out;}
  @keyframes power{0%{transform:scale(1)}25%{transform:scale(1.12)}55%{transform:scale(.98)}100%{transform:scale(1)}}

  /* ---------- victoria ---------- */
  .victory{position:absolute; inset:0; z-index:40; display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; background:rgba(0,0,0,.62);}
  .victory.show{display:flex; animation:fadeIn .5s;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .victory h1{font-size:74px; font-style:italic; text-shadow:0 0 24px currentColor, 3px 3px 0 #000;}
  .victory .vmon{height:48vh;}
  .victory .vmon svg{height:100%; width:auto;}
  .victory .vsub{font-size:26px; font-weight:bold; text-shadow:2px 2px 0 #000;}

  /* ---------- simulador ---------- */
  #sim{position:absolute; right:10px; top:10px; z-index:50; width:280px;
    background:rgba(10,12,22,.92); border:1px solid rgba(255,255,255,.15); border-radius:12px;
    padding:12px; font-size:13px; display:flex; flex-direction:column; gap:8px;}
  #sim h3{font-size:14px; margin-bottom:2px;}
  #sim .row{display:flex; gap:6px;}
  #sim select,#sim input,#sim button{font:inherit; padding:5px 7px; border-radius:7px;
    border:1px solid rgba(255,255,255,.2); background:#161a2b; color:#fff;}
  #sim select option.unavailable{color:#ff4b4b; background:#241116;}
  #sim button{cursor:pointer; background:#222a44;}
  #sim button:hover{background:#2e3a63;}
  #sim .lbl{opacity:.7; font-size:11px; text-transform:uppercase; letter-spacing:.5px;}
  body.obs #sim{display:none;}
</style>
</head>
<body>
<div id="app">
  <div class="bg"></div><div class="stars"></div>
  <canvas id="clash"></canvas>
  <div class="feed-side" id="feed-left"></div>
  <div class="feed-side" id="feed-right"></div>

  <div class="duel-users">
    <div class="duel-user" id="duel-user-left"></div>
    <div class="vs">VS</div>
    <div class="duel-user" id="duel-user-right"></div>
  </div>

  <!-- scouters: nivel de KI de cada luchador (estilo Dragon Ball) -->
  <div class="scouter" id="scouter-left">
    <div class="lens">
      <div class="sc-top"><span class="sc-tag">PODER</span><i class="sc-dot"></i></div>
      <div class="sc-readout"><span class="sc-ki" id="ki-left">0</span><span class="sc-unit">KI</span></div>
      <div class="sc-user" id="sc-user-left"></div>
      <div class="sc-bars" id="ki-bars-left"><i></i><i></i><i></i><i></i><i></i><i></i></div>
      <span class="sc-scan"></span>
    </div>
  </div>
  <div class="scouter" id="scouter-right">
    <div class="lens">
      <div class="sc-top"><span class="sc-tag">PODER</span><i class="sc-dot"></i></div>
      <div class="sc-readout"><span class="sc-ki" id="ki-right">0</span><span class="sc-unit">KI</span></div>
      <div class="sc-user" id="sc-user-right"></div>
      <div class="sc-bars" id="ki-bars-right"><i></i><i></i><i></i><i></i><i></i><i></i></div>
      <span class="sc-scan"></span>
    </div>
  </div>

  <div class="stage">
    <!-- IZQUIERDA -->
    <div class="fighter left" id="f-left">
      <div class="charbox" id="box-left">
        <div class="particles" id="part-left"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="aura" id="aura-left"></div>
        <div class="monigote" id="mon-left"></div>
        <div class="flash" id="flash-left"><span class="fx-pillar"></span><span class="fx-ring2"></span></div>
      </div>
    </div>

    <!-- CENTRO -->
    <div class="center">
      <div class="timer-row">
        <div class="timer-avatar empty" id="timer-av-left">?</div>
        <div class="timer" id="timer">05:00</div>

/* ---- sombreado de color + rayos eléctricos (SS2+) ---- */
function shadeHex(hex, amt){
  const c = clashHex(hex); const tw = amt<0 ? 0 : 1; const k = Math.abs(amt);
  const m = v => Math.round((v + (tw - v)*k)*255);
  return 'rgb('+m(c[0])+','+m(c[1])+','+m(c[2])+')';
}
function hairColors(s, ph){
  if(s.name && s.phase>0) return {sh:shadeHex(ph.glow,-0.5), base:ph.glow, hi:shadeHex(ph.glow,0.55)};
  return {sh:'#0c0c12', base:'#1b1b24', hi:'#34343f'};
}
const SVGNS = 'http://www.w3.org/2000/svg';
function jbolt(cx,cy,rs){
  rs = rs || 1;
  const a=Math.random()*Math.PI*2; const r0=(32+Math.random()*26)*rs;
  let x=cx+Math.cos(a)*r0, y=cy+Math.sin(a)*r0*1.25;
  let d='M'+x.toFixed(1)+' '+y.toFixed(1);
  const steps=3+(Math.random()*3|0), rEnd=r0+(44+Math.random()*78)*rs;
  for(let i=1;i<=steps;i++){ const r=r0+(rEnd-r0)*(i/steps); const aa=a+(Math.random()-0.5)*0.6;
    const px=cx+Math.cos(aa)*r+(Math.random()-0.5)*16*rs, py=cy+Math.sin(aa)*r*1.25+(Math.random()-0.5)*16*rs;
    d+=' L'+px.toFixed(1)+' '+py.toFixed(1); }
  return d;
}
function updateLightning(side){
  const s=sides[side], g=document.getElementById('lightning-'+side);
  if(!g) return;
  while(g.firstChild) g.removeChild(g.firstChild);
  const ph = s.name ? ladderOf(s.name)[s.phase] : null;
  if(!ph || !ph.lightning){ g.style.display='none'; return; }
  g.style.display='';
  const glow = ph.glow;
  // si es sprite, los rayos van más grandes y centrados en el cuerpo del sprite
  const isSprite = !!(SPRITES[s.name] && SPRITES[s.name][ph.name]);
  const lcx = isSprite ? 134 : 110, lcy = isSprite ? 232 : 176, lrs = isSprite ? 1.5 : 1;
  const n = (isSprite?5:4)+(Math.random()*3|0);
  for(let i=0;i<n;i++){
    const d=jbolt(lcx,lcy,lrs);
    for(const spec of [[glow,'7','0.35'],[glow,'4','0.7'],['#ffffff','1.8','1']]){
      const p=document.createElementNS(SVGNS,'path');
      p.setAttribute('d',d); p.setAttribute('fill','none'); p.setAttribute('stroke',spec[0]);
      p.setAttribute('stroke-width',spec[1]); p.setAttribute('stroke-linejoin','round');
      p.setAttribute('stroke-linecap','round'); p.setAttribute('opacity',spec[2]);
      g.appendChild(p);
    }
  }
}

const spriteImageCache = {};
function spriteUrl(file){ return 'assets/'+file+'.png'; }
function preloadSprites(){
  const seen = new Set();
  for(const phases of Object.values(SPRITES)){
    for(const conf of Object.values(phases)){
      if(!conf || !conf.f) continue;
      const url = spriteUrl(conf.f);
      if(seen.has(url)) continue;
      seen.add(url);
      const img = new Image();
      img.src = url;
      spriteImageCache[url] = img;
    }
  }
}
preloadSprites();
function placeSprite(side, conf){
  const t = SPR_T;
  const feetImg = conf.cy + conf.ch;
  let Sc = t.fh / Math.max(40, feetImg - conf.hy);       // normaliza altura de cuerpo
  Sc = Math.max(t.scMin, Math.min(t.scMax, Sc));
  Sc *= conf.scale || 1;
  const X = t.handX - conf.hx*Sc + (conf.x || 0);           // ancla la mano en X y permite ajuste fino
  const Y = t.baseY - feetImg*Sc + (conf.y || 0);          // ancla los pies abajo y permite ajuste fino
  const csp = document.getElementById('charsprite-'+side);
  const drawn = document.getElementById('drawn-'+side);
  const sg = document.getElementById('sprite-'+side);
  const fp = document.getElementById('firePoint-'+side);
  const url = spriteUrl(conf.f);
  const prevUrl = csp.getAttribute('href') || '';
  const changed = prevUrl !== url;
  const cached = spriteImageCache[url]?.complete && spriteImageCache[url]?.naturalWidth > 0;
  if(changed && !cached) csp.style.display = 'none';
  csp.onerror = ()=>{
    if(csp.getAttribute('href') !== url) return;
    csp.style.display = 'none';
    if(sg) sg.classList.remove('sprite-bob');
    if(drawn) drawn.style.display = '';
    if(fp){ fp.setAttribute('cx', 208); fp.setAttribute('cy', 145); }
  };
  csp.onload = ()=>{
    if(csp.getAttribute('href') !== url) return;
    csp.style.display = '';
    if(drawn) drawn.style.display = 'none';
  };
  if(sg) sg.classList.toggle('sprite-bob', conf.bob !== false);
  csp.setAttribute('href', url);
  csp.setAttributeNS('http://www.w3.org/1999/xlink','href', url);
  csp.setAttribute('x', X.toFixed(1)); csp.setAttribute('y', Y.toFixed(1));
  csp.setAttribute('width', (conf.iw*Sc).toFixed(1));
  csp.setAttribute('height', (conf.ih*Sc).toFixed(1));
  if(!changed || cached) csp.style.display = '';
  if(fp){ fp.setAttribute('cx', (X+conf.hx*Sc).toFixed(1));
          fp.setAttribute('cy', (Y+conf.hy*Sc).toFixed(1)); }
}

function phaseStops(name){
  const ladder = ladderOf(name);
  const spr = SPRITES[name];
  if(!spr) return ladder.map((_,i)=>i);
  const stops = [0];
  let prevFile = spr[ladder[0].name]?.f || null;
  for(let i=1; i<ladder.length; i++){
    const curFile = spr[ladder[i].name]?.f || null;
    if(!curFile || !prevFile || curFile !== prevFile) stops.push(i);
    if(curFile) prevFile = curFile;
  }
  return stops;
}

function hasPlayableSprite(name){
  const ladder = ladderOf(name);
  const spr = SPRITES[name];
  return !!(spr && ladder.some(ph => spr[ph.name] && spr[ph.name].f));
}

function findCharText(text){
  const raw = String(text||'').trim();
  const m = raw.match(/!(\S+)/);
  const q = slug(m ? m[1] : raw);
  if(!q) return null;
  let best = null;
  for(const name of Object.keys(ROSTER)){
    const s = slug(name);
    if(s===q || s.includes(q) || q.includes(s)) return name;
    let dist = 0, a=q, b=s;
    const prev = Array.from({length:b.length+1},(_,i)=>i);
    for(let i=1;i<=a.length;i++){
      let last = prev[0]; prev[0]=i;
      for(let j=1;j<=b.length;j++){
        const old = prev[j];
        prev[j] = Math.min(prev[j]+1, prev[j-1]+1, last+(a[i-1]===b[j-1]?0:1));
        last = old;
      }
    }
    dist = prev[b.length];
    if(dist <= (q.length>=8?2:1) && (!best || dist < best.dist)) best = {name, dist};
  }
  return best && best.name;
}

function nextPhaseIndex(name, phase){
  const stops = phaseStops(name);
  return stops.find(i=>i>phase);
}

// progreso (0..1) hacia la siguiente fase
function barPct(side){
  const s = sides[side]; if(!s.name) return 0;
  const ladder = ladderOf(s.name); const ph = ladder[s.phase], next = ladder[nextPhaseIndex(s.name, s.phase)];
  if(!next) return 1;
  return Math.max(0, Math.min(1, (s.energy - ph.at) / (next.at - ph.at)));
}
// barra que NUNCA retrocede: al subir de fase se completa al 100% y luego salta
// (sin animar hacia atrás) al arranque de la nueva fase, enmascarado por el flash.
function setFill(side, team){
  const s = sides[side];
  const el = document.getElementById('fill-'+side);
  if(team) el.style.background = team;
  const phaseUp = s.phase > (s._barPhase|0);
  s._barPhase = s.phase|0;
  if(phaseUp){
    el.style.transition = '';            // 1) completa la fase anterior (avanza al 100%)
    el.style.transform = 'scaleX(1)';
    s._barFull = true;
    clearTimeout(el._rt);
    el._rt = setTimeout(()=>{             // 2) arranca la nueva fase sin retroceso visible
      const np = barPct(side);
      el.style.transition = 'none';
      el.style.transform = 'scaleX('+np+')';
      void el.offsetWidth;               // reflow para fijar el salto sin animación
      el.style.transition = '';
      s._barFull = false; s._barPct = np;
    }, 500);
    s._barPct = 1;
    return;
  }
  if(s._barFull) return;                  // en plena ventana "completa→salta": no tocar
  let pct = barPct(side);
  if(pct < (s._barPct||0)) pct = s._barPct;   // dentro de la fase nunca hacia atrás
  el.style.transition = '';
  el.style.transform = 'scaleX('+pct+')';
  s._barPct = pct;
}

function scouterCellFills(side){
  const s = sides[side]; if(!s.name) return [];
  const ladder = ladderOf(s.name);
  const stops = phaseStops(s.name);
  const fills = [];
  for(let i=0; i<stops.length-1; i++){
    const from = ladder[stops[i]], to = ladder[stops[i+1]];
    let pct = (s.energy - from.at) / Math.max(1, to.at - from.at);
    fills.push(Math.max(0, Math.min(1, pct)));
  }
  return fills;
}

function setScouterBars(side, team){
  const sc = document.getElementById('scouter-'+side);
  if(!sc) return;
  const s = sides[side];
  sc.classList.toggle('on', !!s.name);
  sc.style.setProperty('--sc', team);
  const ki = s.name ? s.energy * KI_SCALE : 0;
  sc.classList.toggle('ki-warn', ki >= 500 && ki < 1000);
  sc.classList.toggle('ki-danger', ki >= 1000);
  const userEl = document.getElementById('sc-user-'+side);
  if(userEl) userEl.textContent = s.name ? (s.user || s.name || '') : '';
  const wrap = sc.querySelector('.sc-bars');
  if(!wrap) return;
  const fills = scouterCellFills(side);
  if(!s.name){ wrap.innerHTML = ''; return; }
  if(wrap.children.length !== fills.length){
    wrap.innerHTML = fills.map(()=>'<i><span></span></i>').join('');
  }
  [...wrap.children].forEach((cell,i)=>{
    cell.querySelector('span')?.style.setProperty('--fill', fills[i].toFixed(4));
  });
}

function renderSide(side){
  const s = sides[side];
  const ladder = s.name ? ladderOf(s.name) : LADDERS.generic;
  const ph = ladder[s.phase];
  const next = s.name ? ladder[nextPhaseIndex(s.name, s.phase)] : ladder[s.phase+1];
  const team = s.name ? cfg(s.name).team : (side==='left'?'#ff7a00':'#2d6cff');
  setTimerAvatar(side);
  setDuelUser(side);

  document.getElementById('name-'+side).textContent = s.name || '—';
  document.getElementById('name-'+side).style.color = team;
  const phEl = document.getElementById('phase-'+side);
  phEl.textContent = s.name ? ph.name : '';
  phEl.style.color = ph.glow;
  document.getElementById('en-'+side).textContent = Math.round(s.energy);
  document.getElementById('next-'+side).textContent = next ? ('→ '+next.name+' ('+next.at+')') : 'MÁXIMO';

  // barra: progreso hacia la siguiente fase (nunca retrocede; al subir de fase completa y salta)
  setFill(side, team);

  document.getElementById('sup-'+side).textContent =
    s.supporters.slice(-3).map(u=>'⚡'+u).join('  ');

  // aura / partículas / rayos
  const box = document.getElementById('box-'+side);
  const aura = document.getElementById('aura-'+side);
  const part = document.getElementById('part-'+side);
  box.style.setProperty('--glow', ph.glow);
  aura.style.setProperty('--glow', ph.glow);
  part.style.setProperty('--glow', ph.glow);
  const active = s.name && s.phase>0;
  aura.style.opacity = active ? Math.min(1,0.4+s.phase*0.12) : 0;
  part.style.opacity = active ? 0.9 : 0;
  box.classList.toggle('lightning', !!ph.lightning);
  box.classList.toggle('charged', active);

  // monigote: brillo, pelo (color + tamaño), pelo largo (SS3+) y color del gi
  const svg = document.querySelector('#mon-'+side+' .mon-svg');
  if(svg) svg.style.filter = active ? 'drop-shadow(0 0 16px '+ph.glow+')' : 'none';
  // pelo real (PNG por fase) colocado detrás de la foto-cabeza
  const himg = document.getElementById('hairimg-'+side);
  if(himg){
    const h = s.name ? HAIR_BY_PHASE[ph.name] : null;
    if(h){
      const pos = HAIR_POS[h.file];
      const H = pos.w * h.ih / h.iw;
      himg.setAttribute('href', 'assets/'+h.file+'.png');
      himg.setAttributeNS('http://www.w3.org/1999/xlink','href','assets/'+h.file+'.png');
      himg.setAttribute('x', pos.x); himg.setAttribute('y', pos.y);
      himg.setAttribute('width', pos.w); himg.setAttribute('height', H);
      himg.style.display='';
    } else { himg.style.display='none'; }
  }
  const gi = document.getElementById('gi-'+side);
  if(gi) gi.setAttribute('fill', team);
  document.getElementById('arms-'+side)?.setAttribute('stroke', team);
  updateLightning(side);

  // scouter: color de equipo, visibilidad y celdillas proporcionales por tramo de fase.
  setScouterBars(side, team);

  // ---- sprite completo (Goku/Vegeta) en vez del monigote dibujado ----
  const conf = s.name && SPRITES[s.name] ? SPRITES[s.name][ph.name] : null;
  const drawn = document.getElementById('drawn-'+side);
  const csp = document.getElementById('charsprite-'+side);
  const sg = document.getElementById('sprite-'+side);
  const fp = document.getElementById('firePoint-'+side);
  if(conf){
    placeSprite(side, conf);
    if(drawn) drawn.style.display = 'none';
  } else {
    if(csp) csp.style.display = 'none';
    if(sg) sg.classList.remove('sprite-bob');
    if(drawn) drawn.style.display = '';
    if(fp){ fp.setAttribute('cx', 208); fp.setAttribute('cy', 145); }
  }
}

/* ---- scouter: el número de KI sube/baja contando hacia el valor real ---- */
const KI_SCALE = 1;             // el scouter marca el mismo KI que la barra de energía
const kiShown = {left:0, right:0};
function kiTarget(side){ const s=sides[side]; return s.name ? Math.round(s.energy*KI_SCALE) : 0; }
function fmtKI(n){ return n.toLocaleString('es-ES'); }
function animateScouters(){
  for(const side of ['left','right']){
    const el = document.getElementById('ki-'+side);
    if(!el) continue;
    const tgt = kiTarget(side), cur = kiShown[side];
    if(cur !== tgt){
      const diff = tgt - cur;
      const step = Math.sign(diff) * Math.max(1, Math.ceil(Math.abs(diff)*0.16));
      let nv = cur + step;
      if((step>0 && nv>tgt) || (step<0 && nv<tgt)) nv = tgt;
      kiShown[side] = nv;
      el.textContent = fmtKI(nv);
    }
  }
  requestAnimationFrame(animateScouters);
}

/* ====================== MECÁNICA ====================== */
function pickCharacter(side, name, faceUrl, faceLabel){
  if(ended) return;
  if(!hasPlayableSprite(name)) return;
  const fillEl = document.getElementById('fill-'+side);
  if(fillEl){ clearTimeout(fillEl._rt); fillEl.style.transition='none'; fillEl.style.transform='scaleX(0)'; void fillEl.offsetWidth; fillEl.style.transition=''; }
  sides[side] = {name, energy:0, phase:0, supporters:[], face:faceUrl||null, user:faceLabel||name};
  setFace(side, faceUrl||null, faceLabel||name);
  renderSide(side);
}

function openSide(){
  if(!sides.left.name) return 'left';
  if(!sides.right.name) return 'right';
  return null;
}

function queueKey(username, name){ return slug(username)+'|'+slug(name); }

function renderQueue(){
  const el = document.getElementById('queue');
  if(!el) return;
  if(!fightQueue.length){ el.innerHTML=''; return; }
  el.innerHTML = '<b>Cola:</b> '+fightQueue.slice(0,8).map(q=>
    '<span>'+q.user.replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))+' - '+q.name+'</span>'
  ).join(' · ')+(fightQueue.length>8?' · ...':'');
}

function enqueueFighter(entry){
  if(fightQueue.some(q=>queueKey(q.key||q.user,q.name)===queueKey(entry.key||entry.user,entry.name))) return;
  fightQueue.push(entry);
  renderQueue();
}

function activateQueuedOrPending(entry){
  if(!entry || !hasPlayableSprite(entry.name)) return null;
  const side = openSide();
  if(side){
    pickCharacter(side, entry.name, entry.face, entry.user);
    userTeam[entry.key || entry.user] = side;
    renderQueue();
    return side;
  }
  enqueueFighter(entry);
  return null;
}

function checkTransform(side){
  const s = sides[side];
  if(!s.name) return;
  const ladder = ladderOf(s.name);
  const stops = phaseStops(s.name);
  let np = s.phase;
  for(const i of stops){
    if(i > np && s.energy >= ladder[i].at) np = i;
  }
  if(np > s.phase){ s.phase = np; transformFX(side); }
}

function transformFX(side){
  const box = document.getElementById('box-'+side);
  const flash = document.getElementById('flash-'+side);
  renderSide(side);
  flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
  box.classList.remove('transform'); void box.offsetWidth; box.classList.add('transform');
  clearTimeout(box._tt); box._tt = setTimeout(()=>box.classList.remove('transform'), 760);
  document.body.classList.remove('shake'); void document.body.offsetWidth; document.body.classList.add('shake');
  const sc = document.getElementById('scouter-'+side);
  if(sc){ sc.classList.remove('spike'); void sc.offsetWidth; sc.classList.add('spike');
    clearTimeout(sc._st); sc._st = setTimeout(()=>sc.classList.remove('spike'), 620); }
  const ph = ladderOf(sides[side].name)[sides[side].phase];
  const ebar = document.querySelector('#np-'+side+' .ebar');
  if(ebar){ ebar.style.setProperty('--pu', ph.glow);
    ebar.classList.remove('powerup'); void ebar.offsetWidth; ebar.classList.add('powerup');
    clearTimeout(ebar._pt); ebar._pt = setTimeout(()=>ebar.classList.remove('powerup'), 720); }
  popFeed('⬆ '+sides[side].name+' → '+ph.name, ph.glow, side);
}

function addEnergy(side, amount, username, userKey){
  if(ended || !sides[side].name) return;
  const s = sides[side];
  const ladder = ladderOf(s.name);
  const mult = ladder[s.phase].mult || 1;
  s.energy += amount * mult;
  if(username){
    userTeam[userKey || username] = side;
    if(!s.supporters.includes(username)) s.supporters.push(username);
  }
  const box = document.getElementById('box-'+side);
  box.classList.add('charging');
  clearTimeout(box._ct); box._ct = setTimeout(()=>box.classList.remove('charging'), 900);
  checkTransform(side);
  renderSide(side);
}

// Decide a qué lado va un regalo de quien aún no tiene equipo.
function sideForGift(username, namedChar){
  if(userTeam[username]) return userTeam[username];
  if(namedChar){
    if(sides.left.name===namedChar) return 'left';
    if(sides.right.name===namedChar) return 'right';
  }
  // si no ha elegido, refuerza al que va por detrás (mantiene la pelea reñida)
  return sides.left.energy <= sides.right.energy ? 'left' : 'right';
}

function popFeed(text, color, side){
  // si se indica lado, el contador sale en ese lado (donante izq/dcha); si no, al centro
  const feed = document.getElementById(side ? 'feed-'+side : 'feed');
  const el = document.createElement('div');
  el.className='gift-pop'; el.textContent=text;
  if(color){ el.style.color=color; el.style.borderColor=color; }
  feed.appendChild(el);
  setTimeout(()=>el.remove(), 3400);
  while(feed.children.length>6) feed.firstChild.remove();
}

/* ====================== TEMPORIZADOR ====================== */
function startTimer(){
  const mins = parseInt(document.getElementById('sim-mins').value)||5;
  DURATION = mins*60; timer = DURATION; ended=false; running=true;
  document.getElementById('victory').classList.remove('show');
  document.getElementById('timer').textContent = fmt(timer);
  if(timerId) clearInterval(timerId);
  timerId = setInterval(tick, 1000);
}
function tick(){
  if(!running) return;
  timer--;
  const el = document.getElementById('timer');
  el.textContent = fmt(Math.max(0,timer));
  el.classList.toggle('low', timer<=30);
  if(timer<=0){ clearInterval(timerId); running=false; endBattle(); }
}
function endBattle(){
  ended=true;
  const L=sides.left, R=sides.right;
  let win, lose, side;
  if(L.energy===R.energy){ win=null; }
  else if(L.energy>R.energy){ win=L; lose=R; side='left'; }
  else { win=R; lose=L; side='right'; }
  const v=document.getElementById('victory');
  const t=document.getElementById('v-title');
  const vmon=document.getElementById('v-mon');
  if(!win || !win.name){ t.textContent='¡EMPATE!'; t.style.color='#ffd23f';
    vmon.innerHTML='';
    document.getElementById('v-sub').textContent=''; v.classList.add('show'); return; }
  const ph=ladderOf(win.name)[win.phase];
  window.__clashWin = side;   // el haz ganador arrolla al perdedor
  t.textContent='¡'+(win.user||win.name).toUpperCase()+' GANA!';
  t.style.color=ph.glow;
  // clona el monigote ganador (con su cara, pelo y aura)
  vmon.innerHTML = document.getElementById('mon-'+side).innerHTML;
  const vsvg = vmon.querySelector('svg');
  if(vsvg) vsvg.style.filter = 'drop-shadow(0 0 28px '+ph.glow+')';
  document.getElementById('v-sub').textContent =
    win.name+' · '+ph.name+' · '+Math.round(win.energy)+' de energía';
  v.classList.add('show');
}

function resetAll(){
  if(timerId) clearInterval(timerId);
  running=false; ended=false; timer=DURATION; window.__clashWin=null;
  sides.left={name:null,energy:0,phase:0,supporters:[],face:null,user:null};
  sides.right={name:null,energy:0,phase:0,supporters:[],face:null,user:null};
  for(const k in userTeam) delete userTeam[k];
  for(const k in pendingPick) delete pendingPick[k];
  fightQueue.length = 0;
  renderQueue();
  for(const side of ['left','right']){ const f=document.getElementById('fill-'+side);
    if(f){ clearTimeout(f._rt); f.style.transition='none'; f.style.transform='scaleX(0)'; void f.offsetWidth; f.style.transition=''; } }
  kiShown.left=0; kiShown.right=0;
  document.getElementById('ki-left').textContent='0';
  document.getElementById('ki-right').textContent='0';
  document.getElementById('victory').classList.remove('show');
  document.getElementById('v-mon').innerHTML='';
  document.getElementById('timer').textContent=fmt(timer);
  document.getElementById('timer').classList.remove('low');
  setFace('left', null, '?'); setFace('right', null, '?');
  renderAll();
}

/* ====================== EVENTOS TikFinity (SSE) ====================== */
// extrae la URL del avatar de TikTok y la pasa por el proxy /avatar del servidor
function avatarOf(d){
  const a = d.imgprofile||d.img||d.avatar||d.avatarUrl||d.profileImage||d.profilePicture||d.profilePictureUrl||'';
  if(!a || String(a).includes('{')) return '';
  return '/avatar?u='+encodeURIComponent(a);
}

function handleEvent(d){
  const ev = (d.event||'').toLowerCase();
  const userKey = d.username || d.uniqueId || d.userId || d.user || d.nickname || 'alguien';
  const username = d.nickname || d.username || d.user || 'alguien';
  const text = d.comment || d.message || d.text || d.content || '';
  const named = d.character || findCharText(text) || null;
  const face = avatarOf(d);
  const isGift = ev==='gift' || ev==='regalo' || d.coins!=null || d.giftName || d.giftname;

  if(named && !isGift){
    if(!named) return;
    if(!hasPlayableSprite(named)) return;
    pendingPick[userKey] = {name:named, face, user:username, key:userKey};
    return;
  }

  // cualquier regalo aporta energía
  if(isGift){
    const coins = Number(d.coins)>0 ? Number(d.coins) : GIFT_DEFAULT;
    const repeat = Number(d.repeatcount)>0 ? Number(d.repeatcount) : 1;
    const value = Math.max(1, Math.round(coins * repeat));
    let side = userTeam[userKey] || null;
    const wanted = pendingPick[userKey] || null;
    if(!side && wanted){
      side = activateQueuedOrPending(wanted);
      delete pendingPick[userKey];
      if(!side) return;             // entró en cola; este regalo no va a otro equipo
    }
    if(!side && named && hasPlayableSprite(named)){
      side = activateQueuedOrPending({name:named, face, user:username, key:userKey});
      if(!side) return;
    }
    if(!side) side = sideForGift(userKey, named);
    if(!sides[side].name) return;   // todavía no hay luchador en ese lado
    addEnergy(side, value, username, userKey);
    popFeed('+'+value+' ⚡ '+username, cfg(sides[side].name).team, side);
  }
}

function connect(){
  try{
    const es = new EventSource('/events');
    window.__sse = es;
    es.onmessage = (e)=>{ try{ handleEvent(JSON.parse(e.data)); }catch(_){ } };
    es.onerror = ()=>{ es.close(); setTimeout(connect, 2000); };
  }catch(_){ setTimeout(connect, 2000); }
}

/* ====================== CHOQUE DE HACES (WebGL) ====================== */
function clashHex(h){ h=(h||'#888').replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join('');
  const n=parseInt(h,16); return [((n>>16)&255)/255, ((n>>8)&255)/255, (n&255)/255]; }

function initClash(){
  const canvas = document.getElementById('clash');
  const gl = canvas.getContext('webgl', {alpha:true, premultipliedAlpha:false, antialias:true});
  if(!gl){ canvas.style.display='none'; return; }  // sin WebGL: los monigotes siguen funcionando

  const vsSrc = `attribute vec2 a; void main(){ gl_Position = vec4(a,0.0,1.0); }`;
  const fsSrc = `
  precision highp float;
  uniform vec2 uRes; uniform float uTime;
  uniform vec2 uA; uniform vec2 uB; uniform vec2 uC;   // mano izq, mano dcha, punto de choque
  uniform vec3 uColL; uniform vec3 uColR; uniform float uInt;
  float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
  float noise(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
    float a=hash(i),b=hash(i+vec2(1.0,0.0)),c=hash(i+vec2(0.0,1.0)),d=hash(i+vec2(1.0,1.0));
    return mix(mix(a,b,f.x),mix(c,d,f.x),f.y); }
  float fbm(vec2 p){ float s=0.0,a=0.5; for(int i=0;i<5;i++){ s+=a*noise(p); p=p*2.02+7.0; a*=0.5; } return s; }
  vec2 segInfo(vec2 p, vec2 a, vec2 b){
    vec2 pa=p-a, ba=b-a; float t=clamp(dot(pa,ba)/max(dot(ba,ba),1e-5),0.0,1.0);
    return vec2(distance(p, a+ba*t), t); }
  vec3 beam(vec2 p, vec2 a, vec2 c, vec3 col, float t, float dir){
    vec2 si = segInfo(p, a, c);
    float thick = mix(0.012, 0.095, pow(si.y,0.8));
    float wob = (fbm(vec2(si.y*11.0 + dir*t*6.0, dir*3.0))-0.5)*thick*2.2;
    wob += sin(si.y*42.0 + t*4.0*dir)*thick*0.18;
    float edge = smoothstep(0.0, 0.08, si.y) * smoothstep(1.0, 0.72, si.y);
    float core = exp(-pow(abs(si.x+wob)/thick, 1.65)) * edge;
    float mist = exp(-pow(abs(si.x+wob)/(thick*2.35), 1.25)) * edge;
    float streak = 0.55+0.75*fbm(vec2(si.y*18.0 + dir*t*7.0, (si.x+wob)*45.0));
    return col*(core*mix(0.45,1.35,si.y)*streak + mist*0.26) + vec3(1.0)*core*core*mix(0.03,0.65,si.y);
  }
  void main(){
    vec2 uv = gl_FragCoord.xy/uRes;
    float asp = uRes.x/uRes.y;
    vec2 p = vec2(uv.x*asp, uv.y);
    float t = uTime;
    vec3 col = vec3(0.0);
    col += beam(p, uA, uC, uColL, t, 1.0);
    col += beam(p, uB, uC, uColR, t, -1.0);
    // plasma en el punto de choque
    float d = distance(p, uC);
    float ang = atan(p.y-uC.y, p.x-uC.x);
    float turb = fbm(vec2(ang*3.0 + t*1.5, d*10.0 - t*2.0))*0.07;
    float r = 0.21 + 0.025*sin(t*7.0) + turb;
    float halo = smoothstep(r*2.8, 0.0, d);
    float body = smoothstep(r, r*0.25, d);
    float coreS = smoothstep(r*0.6, 0.0, d);
    float spikes = pow(0.5+0.5*sin(ang*12.0 + sin(t*1.7)*3.0), 6.0);
    spikes *= smoothstep(r*3.4, r*0.6, d);
    vec3 mixCol = mix(uColL, uColR, clamp((p.x-uC.x)/0.12+0.5, 0.0, 1.0));
    col += mixCol*halo*0.7;
    col += mixCol*spikes*1.1;
    col += mixCol*body*1.8;
    col += vec3(1.0)*coreS*2.8;
    col *= uInt;
    col = vec3(1.0) - exp(-col*1.5);
    float lum = max(max(col.r,col.g),col.b);
    gl_FragColor = vec4(col, clamp(lum*1.15,0.0,1.0));
  }`;

  function sh(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){ console.warn('clash shader:', gl.getShaderInfoLog(s)); } return s; }
  const prog = gl.createProgram();
  gl.attachShader(prog, sh(gl.VERTEX_SHADER, vsSrc));
  gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(prog); gl.useProgram(prog);
  const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog,'a'); gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
  const U = { res:gl.getUniformLocation(prog,'uRes'), time:gl.getUniformLocation(prog,'uTime'),
    A:gl.getUniformLocation(prog,'uA'), B:gl.getUniformLocation(prog,'uB'), C:gl.getUniformLocation(prog,'uC'),
    colL:gl.getUniformLocation(prog,'uColL'), colR:gl.getUniformLocation(prog,'uColR'),
    int:gl.getUniformLocation(prog,'uInt') };

  function resize(){ const dpr=Math.min(1.5, window.devicePixelRatio||1);
    const w=canvas.clientWidth||window.innerWidth, h=canvas.clientHeight||1;
    canvas.width=Math.max(2,(w*dpr)|0); canvas.height=Math.max(2,(h*dpr)|0);
    gl.viewport(0,0,canvas.width,canvas.height); }
  window.addEventListener('resize', resize); resize();
  gl.clearColor(0,0,0,0);

  // posición de una mano (firePoint) en coords aspecto-corregidas, eje Y hacia arriba
  function handPos(id, fallbackX){
    const cr = canvas.getBoundingClientRect();
    const asp = cr.width/cr.height;
    const el = document.getElementById(id);
    if(el){ const b=el.getBoundingClientRect();
      const x=((b.left+b.width/2 - cr.left)/cr.width)*asp;
      const y=1-((b.top+b.height/2 - cr.top)/cr.height);
      return [x,y]; }
    return [fallbackX*asp, 0.5];
  }

  let tpos=0.5, vel=0, inten=0;
  function frame(ts){
    const eL=sides.left.energy||0, eR=sides.right.energy||0;
    const haveL=!!sides.left.name, haveR=!!sides.right.name;
    let ratio = (eL+eR>0) ? eL/(eL+eR) : 0.5;   // más energía izq -> choque hacia la dcha (el que pierde)
    let target = ratio;
    if(window.__clashWin==='left') target=1.0;
    else if(window.__clashWin==='right') target=0.0;
    vel += (target-tpos)*0.02; vel *= 0.86; tpos += vel;   // muelle: pega tirones al donar
    const wob = Math.sin(ts*0.003)*0.01 + Math.sin(ts*0.0017+1.3)*0.006;  // vibración en reposo
    const tt = Math.min(0.97, Math.max(0.03, tpos+wob));
    const want = (haveL && haveR) ? 1 : 0; inten += (want-inten)*0.05;   // solo hay choque con 2 luchadores
    const A = handPos('firePoint-left', 0.22);
    const B = handPos('firePoint-right', 0.78);
    const C = [A[0]+(B[0]-A[0])*tt, A[1]+(B[1]-A[1])*tt];
    const cL = clashHex(haveL?cfg(sides.left.name).team:'#ff7a00');
    const cR = clashHex(haveR?cfg(sides.right.name).team:'#2d6cff');
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.uniform2f(U.res, canvas.width, canvas.height);
    gl.uniform1f(U.time, ts*0.001);
    gl.uniform2f(U.A, A[0],A[1]);
    gl.uniform2f(U.B, B[0],B[1]);
    gl.uniform2f(U.C, C[0],C[1]);
    gl.uniform3f(U.colL, cL[0],cL[1],cL[2]);
    gl.uniform3f(U.colR, cR[0],cR[1],cR[2]);
    gl.uniform1f(U.int, inten);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* ====================== SIMULADOR ====================== */
function fillSelects(){
  const names = Object.keys(ROSTER).sort();
  for(const id of ['sim-left','sim-right']){
    const sel=document.getElementById(id);
    sel.innerHTML = names.map(n=>{
      const ok = hasPlayableSprite(n);
      return '<option value="'+n.replace(/"/g,'&quot;')+'" '+(ok?'':'disabled class="unavailable"')+'>'+n+(ok?'':' (sin PNG)')+'</option>';
    }).join('');
  }
  document.getElementById('sim-left').value='Goku';
  document.getElementById('sim-right').value='Vegeta';
}
function simPick(side){
  const name = document.getElementById('sim-'+side).value;
  if(!hasPlayableSprite(name)) return;
  // foto de prueba (en directo real es la foto de perfil de TikTok)
  const face = 'https://i.pravatar.cc/160?u='+encodeURIComponent(name);
  pickCharacter(side, name, face, name);
}
function simGift(side, val){
  if(!sides[side].name) simPick(side);
  addEnergy(side, val, 'tester');
  popFeed('+'+val+' ⚡ tester', cfg(sides[side].name).team, side);
}
function simGiftCustom(side){
  const input = document.getElementById('sim-energy');
  const val = Math.max(0, Math.floor(Number(input.value)||0));
  if(!val) return;
  simGift(side, val);
}

/* atajos: 0 oculta el simulador (modo OBS), R resetea */
document.addEventListener('keydown',(e)=>{
  if(e.key==='0') document.body.classList.toggle('obs');
  if(e.key.toLowerCase()==='r') resetAll();
});

injectMonigote('left'); injectMonigote('right');
setFace('left', null, '?'); setFace('right', null, '?');
fillSelects();
renderAll();

startLightning();
animateScouters();
connect();
